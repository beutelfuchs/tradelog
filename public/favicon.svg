<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
<rect width="96" height="96" rx="20" fill="#0d1117"/>
<!-- 6 candles in 24x24 box centered at 48,48. x=36-60, y=36-60 -->
<!-- Pole 1 (green) -->
<line x1="37" y1="60" x2="37" y2="52" stroke="#2ea043" stroke-width="3"/>
<rect x="34" y="53" width="6" height="6" rx="1" fill="#2ea043"/>
<!-- Pole 2 (green) -->
<line x1="43" y1="56" x2="43" y2="42" stroke="#2ea043" stroke-width="3"/>
<rect x="40" y="44" width="6" height="10" rx="1" fill="#2ea043"/>
<!-- Flag 1 (red) -->
<line x1="48" y1="44" x2="48" y2="38" stroke="#da3633" stroke-width="3"/>
<rect x="45" y="39" width="6" height="4" rx="1" fill="#da3633"/>
<!-- Flag 2 (red) -->
<line x1="53" y1="46" x2="53" y2="40" stroke="#da3633" stroke-width="3"/>
<rect x="50" y="41" width="6" height="4" rx="1" fill="#da3633"/>
<!-- Breakout 1 (green) -->
<line x1="58" y1="42" x2="58" y2="36" stroke="#2ea043" stroke-width="3"/>
<rect x="55" y="37" width="6" height="4" rx="1" fill="#2ea043"/>
<!-- Breakout 2 (green) -->
<line x1="62" y1="39" x2="62" y2="36" stroke="#2ea043" stroke-width="3"/>
<rect x="59" y="36" width="6" height="3" rx="1" fill="#2ea043"/>
</svg>
