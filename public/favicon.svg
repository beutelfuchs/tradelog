<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
<rect width="96" height="96" rx="20" fill="#0d1117"/>
<!-- 4 candles in 28x28 box centered at 48,48 -->
<!-- Pole (green) -->
<line x1="36" y1="62" x2="36" y2="48" stroke="#2ea043" stroke-width="4"/>
<rect x="32" y="50" width="8" height="10" rx="1.5" fill="#2ea043"/>
<!-- Flag (red) -->
<line x1="46" y1="52" x2="46" y2="42" stroke="#da3633" stroke-width="4"/>
<rect x="42" y="44" width="8" height="6" rx="1.5" fill="#da3633"/>
<!-- Breakout 1 (green) -->
<line x1="55" y1="44" x2="55" y2="36" stroke="#2ea043" stroke-width="4"/>
<rect x="51" y="37" width="8" height="6" rx="1.5" fill="#2ea043"/>
<!-- Breakout 2 (green) -->
<line x1="62" y1="40" x2="62" y2="34" stroke="#2ea043" stroke-width="4"/>
<rect x="58" y="35" width="8" height="4" rx="1.5" fill="#2ea043"/>
</svg>
