<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108">
<!-- 6 candles in tight center box. x=32-76, y=40-68 -->
<!-- Pole 1 (green) -->
<line x1="32" y1="68" x2="32" y2="58" stroke="#2ea043" stroke-width="3"/>
<rect x="28" y="59" width="8" height="8" rx="1.5" fill="#2ea043"/>
<!-- Pole 2 (green) -->
<line x1="41" y1="62" x2="41" y2="48" stroke="#2ea043" stroke-width="3"/>
<rect x="37" y="50" width="8" height="10" rx="1.5" fill="#2ea043"/>
<!-- Flag 1 (red) -->
<line x1="50" y1="52" x2="50" y2="44" stroke="#da3633" stroke-width="3"/>
<rect x="46" y="46" width="8" height="5" rx="1.5" fill="#da3633"/>
<!-- Flag 2 (red) -->
<line x1="58" y1="54" x2="58" y2="46" stroke="#da3633" stroke-width="3"/>
<rect x="54" y="48" width="8" height="5" rx="1.5" fill="#da3633"/>
<!-- Breakout 1 (green) -->
<line x1="67" y1="48" x2="67" y2="40" stroke="#2ea043" stroke-width="3"/>
<rect x="63" y="41" width="8" height="6" rx="1.5" fill="#2ea043"/>
<!-- Breakout 2 (green) -->
<line x1="76" y1="44" x2="76" y2="40" stroke="#2ea043" stroke-width="3"/>
<rect x="72" y="40" width="8" height="4" rx="1.5" fill="#2ea043"/>
</svg>
